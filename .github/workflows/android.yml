name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "✅ Decoding debug.keystore.base64 from repository..."
          base64 --decode debug.keystore.base64 > debug.keystore
        else
          echo "⚠️ No debug.keystore.base64 file found! Generating a temporary development keystore as a fallback..."
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Build Debug APK
      run: |
         if [ -f gradlew ]; then
           chmod +x gradlew
           ./gradlew assembleDebug
         else
           echo "⚠️ gradlew wrapper not found, building with pre-installed system Gradle..."
           gradle assembleDebug
         fi

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: STRIP-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
